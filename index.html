<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form - EduPortal</title>
    <meta name="description" content="A professional student registration form">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Top Nav -->
    <header class="top-nav">
        <div class="nav-container">
            <div class="logo">EduPortal</div>
            <a href="/admin" class="nav-link">Admin Dashboard</a>
        </div>
    </header>

    <div class="container">
        <div class="form-wrapper">
            <h1>Student Registration</h1>
            <p class="subtitle">Please fill out the details below.</p>
            <form method="POST" action="/submit">
                <div class="form-group">
                    <label for="username">Full Name</label>
                    <input type="text" id="username" name="username" placeholder="Enter your full name" required />
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com" required />
                    </div>
                    <div class="form-group">
                        <label for="phone">Contact Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="e.g. +1 234 567 8900" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" placeholder="e.g. 20" min="1" max="120" required />
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <div class="select-wrapper">
                            <select id="gender" name="gender" required>
                                <option value="" disabled selected>Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="branch">Branch</label>
                        <div class="select-wrapper">
                            <select id="branch" name="branch" required>
                                <option value="" disabled selected>Select Branch</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Electrical Engineering">Electrical Engineering</option>
                                <option value="Mechanical Engineering">Mechanical Engineering</option>
                                <option value="Civil Engineering">Civil Engineering</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="qualification">Qualification</label>
                        <input type="text" id="qualification" name="qualification" placeholder="e.g. B.Tech, M.Tech" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Full Address</label>
                    <textarea id="address" name="address" rows="3" placeholder="Enter your complete residential address" required></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">Submit Registration</button>
            </form>
        </div>
    </div>
</body>
</html>
